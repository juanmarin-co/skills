name: Sync Google AIPs

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-google-aip-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Google AIPs
        run: pnpm sync:google-aip

      - name: Commit and push changes
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- skills/google-aip/references skills/google-aip/provenance.json; then
            echo "Google AIPs are already up to date."
            exit 0
          fi

          upstream_commit=$(node -p "require('./skills/google-aip/provenance.json').commit")
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/google-aip/references skills/google-aip/provenance.json
          git commit \
            -m "chore(google-aip): sync upstream AIPs" \
            -m "Upstream commit: ${upstream_commit}"
          git push origin "HEAD:${TARGET_BRANCH}"
